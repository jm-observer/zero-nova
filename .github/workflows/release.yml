name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            os: windows-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install ARM64 toolchain
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add target
        run: rustup target add ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} --features prod
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Get package name
        id: pkg
        shell: bash
        run: |
          PKG_NAME=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].name')
          echo "name=$PKG_NAME" >> "$GITHUB_OUTPUT"

      - name: Prepare artifact
        shell: bash
        run: |
          PKG=${{ steps.pkg.outputs.name }}
          mkdir -p dist
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cp "target/${{ matrix.target }}/release/${PKG}.exe" "dist/${PKG}_${{ matrix.target }}.exe"
          else
            cp "target/${{ matrix.target }}/release/${PKG}" "dist/${PKG}_${{ matrix.target }}"
          fi
      - name: Prepare artifacts
        shell: bash
        run: |
          mkdir -p dist
          BINS="${{ steps.pkg.outputs.name }}"
          for bin in $BINS; do
            SRC="target/${{ matrix.target }}/release/${bin}"
            if [ -f "${SRC}.exe" ]; then SRC="${SRC}.exe"; fi
            if [ -f "$SRC" ]; then
              cp "$SRC" "dist/$(basename $SRC)_${{ matrix.target }}"
            fi
          done

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.pkg.outputs.name }}_${{ matrix.target }}
          path: dist/${{ steps.pkg.outputs.name }}_${{ matrix.target }}*

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Display structure of downloaded files
        run: ls -la dist

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
