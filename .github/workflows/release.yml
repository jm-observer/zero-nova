name: Release

on:
  push:
    tags:
      - "v*"
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  schema-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Export schema and check for changes
        run: |
          cargo run -p nova-protocol --bin export-schema --features export-schema -- --root .
          git diff --exit-code -- schemas/ || (
            echo "::error::Schema exports have changed. Run 'cargo run -p nova-protocol --bin export-schema --features export-schema' to regenerate."
            exit 1
          )

  frontend-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          cache-dependency-path: deskapp/pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install
        working-directory: deskapp
      - name: Regenerate frontend contract helpers
        run: |
          pnpm generate:schemas
          git diff --exit-code -- src/generated/ || (
            echo "::error::Generated frontend contract helpers changed. Run 'pnpm generate:schemas' in deskapp to regenerate."
            exit 1
          )
        working-directory: deskapp
      - name: Run frontend tests (contract tests)
        run: pnpm test
        working-directory: deskapp

  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cargo fmt
        run: cargo fmt --all --check
      - name: Cargo clippy
        run: cargo clippy --workspace -- -D warnings
      - name: Cargo test
        run: cargo test --workspace

  build:
    needs: [schema-check, frontend-check, check]
    strategy:
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: windows-x86_64
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: linux-x86_64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: linux-arm64
            needs_arm_toolchain: true
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: macos-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: macos-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install ARM64 toolchain
        if: matrix.needs_arm_toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add target
        run: rustup target add ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} --features prod
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Get package name
        id: pkg
        shell: bash
        run: |
          PKG_NAME=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].name')
          echo "name=$PKG_NAME" >> "$GITHUB_OUTPUT"

      - name: Prepare artifacts
        shell: bash
        run: |
          mkdir -p dist
          BINS="${{ steps.pkg.outputs.name }}"
          for bin in $BINS; do
            SRC="target/${{ matrix.target }}/release/${bin}"
            if [ -f "${SRC}.exe" ]; then SRC="${SRC}.exe"; fi
            if [ -f "$SRC" ]; then
              cp "$SRC" "dist/$(basename $SRC)_${{ matrix.target }}"
            fi
          done

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.pkg.outputs.name }}_${{ matrix.target }}
          path: dist/${{ steps.pkg.outputs.name }}_${{ matrix.target }}*

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Display structure of downloaded files
        run: ls -la dist

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
