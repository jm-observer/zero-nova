# ── 供应商接入 ──────────────────────────────────────────────────
# api_key 建议通过环境变量 NOVA_API_KEY 设置，避免明文提交到仓库
[provider]
# api_key = ""
base_url = "http://192.168.0.68:8082/v1"

# ── 模型调用参数 ────────────────────────────────────────────────
[llm]
model = "Huihui-Qwen3.6-35B-A3B-Claude-4.6"
max_tokens = 8192
temperature = 0.7

# ── 搜索 ───────────────────────────────────────────────────────
# tavily_api_key 建议通过环境变量 TAVILY_API_KEY 设置
[search]
backend = "tavily"
tavily_api_key = "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"

# ── 工具与能力 ──────────────────────────────────────────────────
[tool]
skills_dir = "skills"
prompts_dir = "prompts"
project_context_file = "PROJECT.md"
default_policy = "workflow"

[tool.bash]
shell = "powershell"
sandbox = false

# ── 网关 ───────────────────────────────────────────────────────
[gateway]
host = "127.0.0.1"
port = 18801
max_iterations = 30
tool_timeout_secs = 3600
subagent_timeout_secs = 300
max_tokens = 4096
skill_routing_enabled = false
skill_history_strategy = "global"
use_turn_context = true

[gateway.trimmer]
enabled = true
context_window = 128000
output_reserve = 8192
min_recent_messages = 10

[gateway.side_channel]
enabled = false
skill_reminder_interval = 5
inject_date = true

# ── Agent 注册 ──────────────────────────────────────────────────
[[gateway.agents]]
id = "nova"
display_name = "Nova"
description = "默认通用助手"
aliases = ["助手"]
prompt_file = "agent-nova.md"

# ── 桌面端远程连接 ──────────────────────────────────────────────
[remote]
enabled = true
host = "127.0.0.1"
port = 18801

# ── Sidecar 启动 ───────────────────────────────────────────────
[sidecar]
mode = "auto"
name = "Built-in Gateway"
command = "nova_gateway_ws"
args = []
port_arg = "--port"
workspace_arg = "--workspace"