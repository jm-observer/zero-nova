[provider]
api_key = ""
base_url = "http://127.0.0.1:8082/v1"

[llm]
model = "gpt-oss-120b"
max_tokens = 8192
temperature = 0.7
top_p = 1.0
thinking_budget = 4096

[search]
backend = "tavily"
tavily_api_key = ""

[tool]
skills_dir = "skills"
prompts_dir = "prompts"
project_context_file = "PROJECT.md"
default_policy = "workflow"

[tool.bash]
shell = "powershell"
sandbox = false

[gateway]
host = "127.0.0.1"
port = 18801
max_iterations = 30
tool_timeout_secs = 3600
subagent_timeout_secs = 300
max_tokens = 4096
skill_routing_enabled = false
skill_history_strategy = "global"
use_turn_context = true

[gateway.trimmer]
enabled = true
context_window = 128000
output_reserve = 8192
min_recent_messages = 10

[gateway.side_channel]
enabled = false
skill_reminder_interval = 5
inject_date = true

[[gateway.agents]]
id = "nova"
display_name = "Nova"
description = "默认通用助手，负责日常问答与任务分发"
aliases = ["小助手", "助手"]
prompt_file = "agent-nova.md"

[remote]
enabled = true
host = "127.0.0.1"
port = 18801

[sidecar]
mode = "auto"
name = "Built-in Gateway"
command = "nova_gateway_ws"
args = []
port_arg = "--port"
workspace_arg = "--workspace"
