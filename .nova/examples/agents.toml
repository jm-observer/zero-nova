# Agent 配置示例（与 [[gateway.agents]] 字段一致）
#
# 字段说明：
#   prompt_file    - 从 [tool].prompts_dir 加载模板文件
#   prompt_inline  - 直接内联 prompt 文本（与 prompt_file 互斥）
#   tool_whitelist - 允许调用的工具白名单，省略表示不限制
#   model_config   - 覆盖全局 [llm] 的模型参数（仅当前 Agent 生效）

[[gateway.agents]]
id = "nova"
display_name = "Nova"
description = "默认通用助手"
aliases = ["助手"]
prompt_file = "agent-nova.md"

[[gateway.agents]]
id = "openclaw"
display_name = "OpenClaw"
description = "代码助手：偏向工程实现与调试"
aliases = ["oc", "架构师"]
prompt_file = "agent-openclaw.md"

[ gateway.agents.model_config ]
model = "gpt-oss-120b"
max_tokens = 6144
temperature = 0.2

[[gateway.agents]]
id = "safe-tool"
display_name = "Safe Tool Agent"
description = "工具受限助手：只允许白名单工具"
aliases = ["安全助手"]
prompt_inline = "你是一个受限工具助手，只能使用允许的工具完成任务。"
tool_whitelist = ["read_file", "web_search"]