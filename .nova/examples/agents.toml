# Agent 配置示例
#
# 每个 [[gateway.agents]] 条目定义一个 Agent。
# 第一个条目为默认活跃 Agent（primary agent）。
#
# 字段说明：
#   id             - 内部唯一标识符，用于协议通信和代码引用
#   display_name   - 前端界面显示的名称
#   description    - Agent 的职能描述，用于路由判断和前端展示
#   aliases        - 自然语言点名时的匹配词（支持中英文，大小写不敏感）
#   prompt_file    - Agent 的 system prompt 模板文件（相对于 [tool].prompts_dir）
#   prompt_inline  - 直接内联 prompt 文本（与 prompt_file 互斥）
#   tool_whitelist - 该 Agent 可使用的工具白名单，省略或为空表示可使用全部工具

[[gateway.agents]]
id = "nova"
display_name = "Nova"
description = "默认通用助手，负责日常问答与任务分发"
aliases = ["小助手", "助手"]
prompt_file = "agent-nova.md"

[[gateway.agents]]
id = "openclaw"
display_name = "OpenClaw"
description = "擅长编写代码与系统部署的资深架构师"
aliases = ["oc", "claw", "架构师", "open-claw"]
prompt_file = "agent-openclaw.md"
tool_whitelist = ["bash", "file_read", "file_write", "web_search"]
