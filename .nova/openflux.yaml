# OpenFlux 配置文件

# ========================
# LLM 供应商配置
# ========================
providers:
  openai:
    apiKey: 123
    baseUrl: http://192.168.0.68:12340/v1

# ========================
# LLM 使用配置 
# ========================
llm:
  # 主编排 LLM (用于任务规划)
  # 注意：Kimi K2.5 不支持自定义 temperature，只能使用默认值
  orchestration:
    provider: moonshot
    model: kimi-k2.5
    # temperature: 不传，Kimi K2.5 只允许默认值
    maxTokens: 4096

  # 执行 LLM (用于工具调用)
  execution:
    provider: moonshot
    model: kimi-k2.5
    # temperature: 不传，Kimi K2.5 只允许默认值
    maxTokens: 4096

  # 嵌入 LLM (用于长期记忆，已随安装包打包)
  # ------------------------------------------------------------------
  # 默认: 折中均衡 (已打包，vectorDim: 384)
  # model: Xenova/paraphrase-multilingual-MiniLM-L12-v2
  # 大小: ~120MB | 语言: 中英均衡 | 速度: 快
  # ------------------------------------------------------------------
  # 可选: 性能最强 (需额外下载 ~560MB，vectorDim: 1024)
  # model: Xenova/bge-m3
  # ------------------------------------------------------------------
  embedding:
    provider: local
    model: Xenova/paraphrase-multilingual-MiniLM-L12-v2

  # 备用 LLM (可选)
  fallback:
    provider: deepseek
    model: deepseek-chat
    temperature: 0.5

# ========================
# 长期记忆配置
# ========================
memory:
  enabled: false
  dbName: openflux_memory.db
  vectorDim: 384
  debug: false
  distillation:
    enabled: true
    startTime: "02:00"
    endTime: "06:00"
    qualityThreshold: 40
    sessionDensityThreshold: 5
    similarityThreshold: 0.85

# ========================
# 远程访问配置
# ========================
remote:
  enabled: true
  port: 18803
  # token: your-secret-token

# ========================
# 权限配置
# ========================
permissions:
  autoApproveLevel: 1
  allowedDirectories:
    - D:\edeProject
  blockedDirectories:
    - C:\Windows
    - C:\Program Files

# ========================
# 浏览器和工具配置
# ========================
browser:
  enabled: true
  headless: false

opencode:
  enabled: true
  autoApprove: false

# ========================
# Web 搜索与获取配置
# ========================
web:
  search:
    # 搜索提供商: brave 或 perplexity
    provider: brave
    # Brave Search API Key（免费层：每月 2000 次请求）
    # 申请地址: https://brave.com/search/api/
    apiKey: ${BRAVE_API_KEY}
    # 默认返回结果数
    maxResults: 5
    # 超时时间（秒）
    timeoutSeconds: 30
    # 缓存 TTL（分钟）
    cacheTtlMinutes: 15
    # Perplexity 配置（当 provider: perplexity 时生效）
    # perplexity:
    #   apiKey: ${PERPLEXITY_API_KEY}
    #   baseUrl: https://api.perplexity.ai
    #   model: perplexity/sonar-pro

  fetch:
    # 是否启用 Readability 提取（默认 true）
    readability: true
    # 最大字符数
    maxChars: 50000
    # 超时时间（秒）
    timeoutSeconds: 30
    # 缓存 TTL（分钟）
    cacheTtlMinutes: 15
    # Firecrawl 配置（可选，用于 JS 密集型网站的回退提取）
    # firecrawl:
    #   apiKey: ${FIRECRAWL_API_KEY}
    #   baseUrl: https://api.firecrawl.dev
    #   onlyMainContent: true

