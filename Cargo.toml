[package]
name = "zero-nova"
version = "0.1.0"
edition = "2021"

[dependencies]
tokio = { version = "1", features = ["full"] }
log = "0.4"
custom-utils = { version = "0.10.21", features = ["daemon-async"] }
reqwest = { version = "0.13", default-features = false, features = ["json", "stream"] }
anyhow = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
async-trait = "0.1.74"

[features]
default = []
prod = ["custom-utils/prod"]
