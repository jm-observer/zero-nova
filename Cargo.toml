[package]
name = "zero-nova"
version = "0.1.0"
edition = "2021"

[dependencies]

tokio-tungstenite = { version = "0.21", features = ["__rustls-tls"] }
tokio = { version = "1", features = ["full"] }
log = "0.4"
custom-utils = { version = "0.10.21", features = ["daemon-async"] }
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls", "stream"] }
anyhow = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
async-trait = "0.1.74"
scraper = "0.19"
futures-util = "0.3"

[features]
# Enable builtin tools
tool-bash = []
tool-file-ops = []
tool-web-search = []
tool-web-fetch = []

# Existing features remained
default = []
prod = ["custom-utils/prod"]
