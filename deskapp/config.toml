# OpenFlux 配置文件

# ========================
# LLM 供应商配置
# ========================
[providers]
[providers.openai]
apiKey = "123"
baseUrl = "http://192.168.0.68:12340/v1"

# ========================
# LLM 使用配置 
# ========================
[llm]
# 主编排 LLM (用于任务规划)
[llm.orchestration]
provider = "moonshot"
model = "kimi-k2.5"
maxTokens = 4096

# 执行 LLM (用于工具调用)
[llm.execution]
provider = "moonshot"
model = "kimi-k2.5"
maxTokens = 4096

# 嵌入 LLM (用于长期记忆)
[llm.embedding]
provider = "local"
model = "Xenova/paraphrase-multilingual-MiniLM-L12-v2"

# 备用 LLM (可选)
[llm.fallback]
provider = "deepseek"
model = "deepseek-chat"
temperature = 0.5

# ========================
# 长期记忆配置
# ========================
[memory]
enabled = false
dbName = "openflux_memory.db"
vectorDim = 384
debug = false

[memory.distillation]
enabled = true
startTime = "02:00"
endTime = "06:00"
qualityThreshold = 40
sessionDensityThreshold = 5
similarityThreshold = 0.85

# ========================
# 远程访问配置
# ========================
[remote]
enabled = true
port = 18801
# token = "your-secret-token"

# ========================
# 权限配置
# ========================
[permissions]
autoApproveLevel = 1
allowedDirectories = ["D:\\edeProject"]
blockedDirectories = ["C:\\Windows", "C:\\Program Files"]

# ========================
# 浏览器和工具配置
# ========================
[browser]
enabled = true
headless = false

[opencode]
enabled = true
autoApprove = false

# ========================
# Web 搜索与获取配置
# ========================
[web]
[web.search]
provider = "brave"
apiKey = "${BRAVE_API_KEY}"
maxResults = 5
timeoutSeconds = 30
cacheTtlMinutes = 15

[web.fetch]
readability = true
maxChars = 50000
timeoutSeconds = 30
cacheTtlMinutes = 15

# ========================
# 语音配置（STT + TTS）
# ========================
[voice]
[voice.stt]
enabled = false

[voice.tts]
enabled = true
voice = "zh-CN-XiaoxiaoNeural"
rate = "+0%"
autoPlay = false

# ========================
# 多 Agent 配置
# ========================
[agents]
[agents.router]
enabled = true

[agents.defaults]
[agents.defaults.tools]
profile = "full"
[agents.defaults.subagents]
maxConcurrent = 5
defaultTimeout = 300
[agents.defaults.subagents.tools]
deny = ["scheduler", "workflow", "desktop"]

# Agent 列表
[[agents.list]]
id = "default"
default = true
name = "通用助手"
description = "处理一般性问题、闲聊、知识问答、信息查询、文本翻译、方案咨询等不涉及文件操作和代码执行的任务"
[agents.list.tools]
profile = "full"

[[agents.list]]
id = "coder"
name = "编码助手"
description = "处理编程、文件操作、代码编写、代码重构、脚本执行、视频/图片/音频等文件生成、数据处理、文档生成等需要使用工具的任务"
[agents.list.tools]
profile = "coding"

[[agents.list]]
id = "automation"
name = "自动化助手"
description = "处理浏览器网页操作（搜索、网购、采购、下单、表单填写）、桌面应用控制、定时任务、工作流自动化、网页数据抓取等自动化任务"
[agents.list.tools]
profile = "automation"

# ========================
# 沙盒隔离配置
# ========================
[sandbox]
mode = "local"
blockedExtensions = ["exe", "bat", "ps1", "cmd", "vbs", "reg", "msi"]

# ========================
# 预置模型列表
# ========================
[presetModels]
[presetModels.openai]
[[presetModels.openai]]
value = "google/gemma-4-31B-it"
label = "gemma-4-31B-it"
multimodal = true

# ========================
# Sidecar 配置 (AI Engine)
# ========================
[sidecar]
mode = "auto"
name = "Built-in Gateway"
command = "D:\\git\\zero-nova\\target\\debug\\nova_gateway.exe"
args = []
working_dir = "."
port_arg = "--port"
