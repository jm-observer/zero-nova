<!DOCTYPE html>
<html lang="zh-CN" id="html-root">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy"
      content="default-src 'self' ipc: https://ipc.localhost; script-src 'self' 'unsafe-eval' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src 'self' ws: wss: ipc: http://ipc.localhost https://ipc.localhost; img-src 'self' data: blob: asset: https://asset.localhost; media-src 'self' preview: blob:; frame-src blob:">
  <title>OpenFlux</title>
  <link rel="icon" type="image/png" href="/icon.png">
  <link rel="stylesheet" href="./src/styles/main.css">
  <link rel="stylesheet" href="./src/styles/chat-timeline.css">
  <script>
    // Early locale detection: set lang and loading text before i18n loads
    (function () {
      var saved = localStorage.getItem('openflux-locale');
      var lang = (saved === 'en') ? 'en' : (saved === 'zh' ? 'zh' : (navigator.language.startsWith('zh') ? 'zh' : 'en'));
      var root = document.getElementById('html-root');
      if (root) root.setAttribute('lang', lang === 'zh' ? 'zh-CN' : 'en');
      if (lang === 'zh') {
        document.addEventListener('DOMContentLoaded', function () {
          var el = document.querySelector('[data-i18n="app.loading"]');
          if (el) el.textContent = '\u667A\u80FD\u4F53\u6B63\u5728\u521D\u59CB\u5316\u2026';
        });
      }
    })();
  </script>
</head>

<body>
  <!-- Startup Loading Overlay -->
  <div id="app-loading-overlay" class="app-loading-overlay">
    <div class="app-loading-content">
      <div class="app-loading-spinner">
        <div></div><div></div><div></div><div></div><div></div><div></div>
        <div></div><div></div><div></div><div></div><div></div><div></div>
      </div>
      <p class="app-loading-text" data-i18n="app.loading">Agent initializing…</p>
    </div>
  </div>

  <!-- 首次启动设置向导 -->
  <div id="setup-wizard" class="setup-wizard" style="display:none">
    <div class="setup-wizard-bg"></div>
    <div class="setup-wizard-container">
      <div class="setup-wizard-header">
        <img src="./src/icon.png" alt="OpenFlux" class="setup-wizard-logo" />
        <h1 data-i18n="setup.welcome">欢迎使用 OpenFlux</h1>
        <p class="setup-wizard-subtitle" data-i18n="setup.subtitle">完成以下设置，即可开始使用你的 AI 助手</p>
        <div class="setup-wizard-steps">
          <div class="setup-step active" data-step="1"><span class="step-num">1</span><span class="step-label" data-i18n="setup.step_assistant">AI 助手</span></div>
          <div class="setup-step-line"></div>
          <div class="setup-step" data-step="2"><span class="step-num">2</span><span class="step-label" data-i18n="setup.step_brain">AI 大脑</span></div>
          <div class="setup-step-line"></div>
          <div class="setup-step" data-step="3"><span class="step-num">3</span><span class="step-label" data-i18n="setup.step_cloud">企业端</span></div>
          <div class="setup-step-line"></div>
          <div class="setup-step" data-step="4"><span class="step-num">4</span><span class="step-label" data-i18n="setup.step_remote">远程操控</span></div>
        </div>
      </div>
      <div class="setup-page active" data-page="1">
        <h2 data-i18n="setup.name_title">给你的 AI 助手起个名字</h2>
        <div class="setup-field">
          <label for="setup-agent-name" data-i18n="setup.name_label">助手名称</label>
          <input type="text" id="setup-agent-name" value="OpenFlux 助手" placeholder="例如：小助、Jarvis..." />
        </div>
      </div>
      <div class="setup-page" data-page="2">
        <h2 data-i18n="setup.brain_title">选择 AI 大脑</h2>
        <div class="setup-field">
          <label for="setup-provider" data-i18n="setup.provider_label">模型供应商</label>
          <select id="setup-provider">
            <option value="openai">OpenAI</option>
            <option value="anthropic">Anthropic</option>
            <option value="ollama">Ollama (Local)</option>
          </select>
        </div>
        <div class="setup-field">
          <label for="setup-api-key" data-i18n="setup.apikey_label">API Key</label>
          <input type="password" id="setup-api-key" placeholder="输入你的 API Key" />
        </div>
      </div>
      <div class="setup-page" data-page="3">
        <h2 data-i18n="setup.cloud_title">企业端 (可选)</h2>
        <div class="setup-field">
          <label for="setup-cloud-url">NexusAI 地址</label>
          <input type="text" id="setup-cloud-url" placeholder="https://nexusai.example.com" />
        </div>
      </div>
      <div class="setup-page" data-page="4">
        <h2 data-i18n="setup.remote_title">远程操控 (可选)</h2>
        <div class="setup-field">
          <label class="checkbox-label">
            <input type="checkbox" id="setup-remote-enable" />
            <span data-i18n="setup.remote_enable">启用 OpenFluxRouter 远程操控</span>
          </label>
        </div>
      </div>
      <div class="setup-wizard-footer">
        <button id="setup-btn-skip" class="setup-btn setup-btn-ghost" data-i18n="setup.skip">跳过设置</button>
        <div class="setup-footer-right">
          <button id="setup-btn-prev" class="setup-btn setup-btn-secondary" style="display:none" data-i18n="setup.prev">上一步</button>
          <button id="setup-btn-next" class="setup-btn setup-btn-primary" data-i18n="setup.next">下一步</button>
        </div>
      </div>
    </div>
  </div>

  <div id="app">
    <header class="title-bar" data-tauri-drag-region>
      <div class="title-bar-left">
        <img src="./icon.png" alt="OpenFlux" class="title-bar-icon" />
        <h1>OpenFlux</h1>
      </div>
      <div class="title-bar-center">
        <div class="status-indicator" id="status-indicator">
          <span class="dot"></span>
          <span class="text" data-i18n="titlebar.status_ready">就绪</span>
        </div>
      </div>
      <div class="title-bar-right">
        <button id="theme-toggle" class="icon-btn title-bar-btn" title="切换主题">
          <svg class="theme-icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5" /><line x1="12" y1="1" x2="12" y2="3" /><line x1="12" y1="21" x2="12" y2="23" /><line x1="4.22" y1="4.22" x2="5.64" y2="5.64" /><line x1="18.36" y1="18.36" x2="19.78" y2="19.78" /><line x1="1" y1="12" x2="3" y2="12" /><line x1="21" y1="12" x2="23" y2="12" /><line x1="4.22" y1="19.78" x2="5.64" y2="18.36" /><line x1="18.36" y1="5.64" x2="19.78" y2="4.22" /></svg>
          <svg class="theme-icon-moon hidden" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" /></svg>
        </button>
        <button id="feedback-btn" class="icon-btn title-bar-btn" title="反馈">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        </button>
        <div class="window-controls">
          <button id="btn-minimize" class="window-btn"><svg width="12" height="12" viewBox="0 0 12 12"><rect y="5" width="12" height="1" fill="currentColor" /></svg></button>
          <button id="btn-maximize" class="window-btn"><svg width="12" height="12" viewBox="0 0 12 12"><rect x="1" y="1" width="10" height="10" stroke="currentColor" stroke-width="1" fill="none" /></svg></button>
          <button id="btn-close" class="window-btn window-btn-close"><svg width="12" height="12" viewBox="0 0 12 12"><path d="M1 1l10 10M11 1L1 11" stroke="currentColor" stroke-width="1.5" /></svg></button>
        </div>
      </div>
    </header>

    <div class="main-layout">
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-top">
          <button id="sidebar-toggle" class="icon-btn" title="收起侧边栏">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 19l-7-7 7-7M18 19l-7-7 7-7" /></svg>
          </button>
          <div class="sidebar-top-title">Zero-Nova</div>
          <button id="new-session-btn" class="icon-btn" title="发起新对话">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
          </button>
        </div>
        <div id="agent-list" class="agent-list"></div>
        <div id="session-list" class="session-list"></div>
        <div class="sidebar-footer">
          <button id="settings-btn" class="icon-btn" title="设置">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3" /><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z" /></svg>
          </button>
        </div>
      </aside>
      <div class="resize-handle" id="sidebar-resize-handle"></div>

      <main class="workspace" id="workspace">
        <header class="chat-header">
          <div class="chat-header-info"><span id="chat-header-title" class="chat-header-title"></span></div>
          <div class="chat-header-actions">
            <button id="inspect-btn" class="icon-btn" data-i18n-title="chat.inspect" title="查看运行态">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
            </button>
          </div>
        </header>
        <div id="chat-minimap" class="chat-minimap">
          <div class="chat-minimap-track"></div>
          <div id="chat-minimap-markers" class="chat-minimap-markers"></div>
        </div>
        <div id="messages" class="messages"></div>
        <div id="agent-edit-view" class="agent-edit-view hidden"></div>
        <div id="settings-view" class="settings-view hidden"></div>
        <div id="confirm-dialog-overlay" class="confirm-dialog-overlay hidden"></div>
        <div id="router-bind-area" class="router-bind-area hidden"></div>
        <div class="input-area">
          <div class="input-container">
            <div id="attachment-preview" class="attachment-preview hidden"></div>
            <div class="input-row">
              <textarea id="message-input" placeholder="问问 OpenFlux..." rows="1"></textarea>
              <button id="mic-btn" class="mic-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z" /></svg></button>
              <button id="send-btn" class="send-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z" /></svg></button>
            </div>
          </div>
        </div>
      </main>

      <aside id="agent-console" class="agent-console hidden"></aside>
    </div>

    <!-- 模态框组 -->
    <div id="file-preview-modal" class="modal hidden"></div>
    <div id="confirm-modal" class="modal hidden"></div>
    <div id="openflux-login-modal" class="modal hidden"></div>
    <div id="voice-overlay" class="voice-overlay hidden"></div>
    <div id="tool-detail-modal" class="modal hidden"></div>

    <!-- Debug 面板 -->
    <div id="debug-panel" class="debug-panel hidden">
      <div id="debug-resize-handle" class="debug-resize-handle"></div>
      <div class="debug-panel-header">
        <span class="debug-panel-title">Debug Log</span>
        <div class="debug-panel-actions">
          <button id="debug-clear-btn" class="icon-btn-sm" title="清空日志"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6" /><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" /></svg></button>
          <button id="debug-close-btn" class="icon-btn-sm" title="关闭"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12" /></svg></button>
        </div>
      </div>
      <div id="debug-log-container" class="debug-log-container"></div>
    </div>
  </div>

  <script type="module" src="./src/main.ts"></script>
</body>
</html>
